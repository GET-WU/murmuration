<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murmuration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f0f0f0; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; cursor: pointer; touch-action: none; }

        #controls {
            position: fixed; top: 12px; right: 12px; z-index: 10; display: none;
            background: rgba(10, 5, 20, 0.85); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
            color: #ddd; font: 12px/1.5 -apple-system, sans-serif;
            width: 240px; max-height: calc(100vh - 24px); overflow-y: auto;
            user-select: none;
        }
        #controls::-webkit-scrollbar { width: 4px; }
        #controls::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .ctrl-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600; font-size: 13px;
        }
        .ctrl-header button {
            background: none; border: none; color: #aaa; font-size: 18px;
            cursor: pointer; line-height: 1; padding: 0 4px;
        }
        #ctrl-body { padding: 4px 0; }
        .ctrl-group-title {
            padding: 6px 12px 2px; font-size: 10px; text-transform: uppercase;
            color: #888; letter-spacing: 0.5px;
        }
        .ctrl-row {
            display: grid; grid-template-columns: 56px 1fr 36px;
            align-items: center; padding: 3px 12px; gap: 6px;
        }
        .ctrl-row label { font-size: 11px; color: #bbb; }
        .ctrl-row input[type=range] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
        }
        .ctrl-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: #ff6f00; border-radius: 50%; cursor: pointer;
        }
        .ctrl-val { font-size: 10px; color: #999; text-align: right; font-variant-numeric: tabular-nums; }
        .ctrl-btns { display: flex; gap: 8px; padding: 8px 12px; }
        .ctrl-btns button {
            flex: 1; padding: 5px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 5px;
            color: #ccc; font-size: 11px; cursor: pointer;
        }
        .ctrl-btns button:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="module" src="main.js"></script>
</body>
</html>
